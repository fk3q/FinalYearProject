server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to the Advanced-tier ceiling (100 MB). Nginx defaults
    # to 1 MB which would otherwise return 413 long before the request ever
    # reaches FastAPI. The backend itself still enforces per-tier caps so
    # this only widens the gate, not the policy.
    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # FastAPI backend (Docker service `backend`; browser calls /api/... on same origin)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Big uploads need a longer write timeout than the default 60s.
        proxy_request_buffering on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
