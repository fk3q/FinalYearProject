# Copy on your EC2 server (same folder as docker-compose.yml):
#   cp deploy/ec2-compose.override.example.yml docker-compose.override.yml
#
# In repo-root `.env` set at least:
#   PUBLIC_ORIGIN=http://YOUR_EC2_PUBLIC_IP:3000
# or after DNS + HTTPS:
#   PUBLIC_ORIGIN=https://your-domain.com
#
# Compose merges this file automatically when named docker-compose.override.yml
# (`docker compose up -d --build`).

services:
  backend:
    environment:
      # Browser Origin when users open the site — required for cookies/CORS checks.
      CORS_ORIGINS: ${PUBLIC_ORIGIN}
      FRONTEND_URL: ${PUBLIC_ORIGIN}

  frontend:
    # Optional: also serve on standard HTTP port (in addition to :3000 from base file).
    ports:
      - "80:80"
